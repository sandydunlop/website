site_name: Test
site_url: https://sandydunlop.github.io
site_description: Test

markdown_extensions:
  - admonition
  - def_list
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

theme:
  logo: assets/logo.png
  # favicon: assets/penguin.svg
  name: material
  custom_dir: overrides
  font:
    text: Barlow
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - navigation.indexes
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      scheme: slate
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    #Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

    #Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to system preference

extra_css:
  - stylesheets/extra.css
extra_javascript:
  - 'javascript/headings.js'
  - 'javascript/mermaid.mjs'
  - 'javascript/svgcolor.js'
extra:
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
  analytics:
    provider: google
    property: G-GMRC7B45YN
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/qishr

plugins:
  - search
  - literate-nav:
      nav_file: SUMMARY.md

nav:
  - Home: index.md
  - Language Processors Collection:
      - Overview: cascara/language-processors/index.md
      - Cascara YAML:
          - Overview: cascara/language-processors/yaml/index.md
          - Performance Comparison: cascara/language-processors/yaml/performance-comparison.md
      - Cascara JSON: cascara/language-processors/json/index.md
  - Cascara Schema: cascara/schema/index.md
  - Cascara UI:
      - Overview: cascara/ui/index.md
      - Theme Engine: cascara/ui/theme-engine/index.md
      - Localizable Menus: cascara/ui/localizable-menus/index.md
      - Schema-Driven Controls: cascara/ui/schema-driven-controls/index.md
  - Javadoc: javadoc/
